<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Constellation — RehabAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── PRD Design Tokens ───────────────────── */
    :root {
      --void:          #08090F;
      --glass:         rgba(255,255,255,0.03);
      --glass-border:  rgba(255,255,255,0.07);
      --gold:          #C9A84C;
      --gold-dim:      rgba(201,168,76,0.18);
      --gold-glow:     rgba(201,168,76,0.45);
      --blue:          #4A6FA5;
      --blue-dim:      rgba(74,111,165,0.18);
      --blue-glow:     rgba(74,111,165,0.45);
      --blue-tile:     rgba(74,111,165,0.22);
      --blue-tile-b:   rgba(74,111,165,0.35);
      --error:         #C47474;
      --error-dim:     rgba(196,116,116,0.18);
      --error-glow:    rgba(196,116,116,0.45);
      --text:          #F0EDE6;
      --text-dim:      rgba(240,237,230,0.45);
      --mono:          'DM Mono', monospace;
      --sans:          'DM Sans', sans-serif;
      --serif:         'Cormorant Garamond', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--void);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 16px 12px;
    }

    /* ── Starfield ───────────────────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ── Header ──────────────────────────────── */
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header h1 {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    .level-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 100px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-dim);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .level-badge span { color: var(--gold); font-size: 0.8rem; }

    /* ── Phase Label ─────────────────────────── */
    .phase-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      height: 18px;
      flex-shrink: 0;
      transition: color 0.3s;
    }

    .phase-label.watching { color: var(--blue); }
    .phase-label.respond  { color: var(--gold); }
    .phase-label.success  { color: var(--gold); }
    .phase-label.fail     { color: var(--error); }

    /* ── Sequence Dots ───────────────────────── */
    .seq-track {
      display: flex;
      gap: 6px;
      align-items: center;
      min-height: 12px;
      flex-shrink: 0;
    }

    .seq-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .seq-dot.lit  { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 7px var(--gold-glow); }
    .seq-dot.done { background: rgba(201,168,76,0.3); border-color: rgba(201,168,76,0.5); }
    .seq-dot.err  { background: var(--error); border-color: var(--error); }

    /* ── Grid ────────────────────────────────── */
    .grid-wrap {
      width: min(440px, 92vw);
      /* Grows to fill the remaining vertical space */
      flex: 1;
      min-height: 0;
      aspect-ratio: 1;
      align-self: center;
      max-height: min(440px, 60vh);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      height: 100%;
    }

    .tile {
      background: var(--blue-tile);
      border: 1.5px solid var(--blue-tile-b);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(255,255,255,0.06) 0%, transparent 70%);
    }

    .tile:hover:not(.disabled) {
      background: rgba(74,111,165,0.32);
      border-color: rgba(74,111,165,0.55);
      transform: scale(0.97);
    }

    .tile:active:not(.disabled) { transform: scale(0.93); }

    .tile.disabled { cursor: not-allowed; }

    /* Flash states */
    .tile.flash-gold {
      background: rgba(201,168,76,0.55) !important;
      border-color: var(--gold) !important;
      box-shadow: 0 0 28px var(--gold-glow), inset 0 0 20px rgba(201,168,76,0.2) !important;
      transform: scale(1.03) !important;
    }

    .tile.flash-correct {
      background: rgba(201,168,76,0.45) !important;
      border-color: var(--gold) !important;
      box-shadow: 0 0 22px var(--gold-glow) !important;
    }

    .tile.flash-wrong {
      background: rgba(196,116,116,0.5) !important;
      border-color: var(--error) !important;
      box-shadow: 0 0 22px var(--error-glow) !important;
    }

    /* ── Feedback Banner ─────────────────────── */
    .feedback {
      width: min(440px, 92vw);
      padding: 9px 16px;
      border-radius: 10px;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-align: center;
      min-height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-dim);
    }

    .feedback.watching { background: var(--blue-dim);  border-color: rgba(74,111,165,0.35);  color: #6e9bd4; }
    .feedback.respond  { background: var(--gold-dim);  border-color: rgba(201,168,76,0.35);  color: var(--gold); }
    .feedback.success  { background: var(--gold-dim);  border-color: rgba(201,168,76,0.5);   color: var(--gold); }
    .feedback.fail     { background: var(--error-dim); border-color: rgba(196,116,116,0.35); color: var(--error); }

    /* ── Stats Bar ───────────────────────────── */
    .stats-bar {
      width: min(440px, 92vw);
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 9px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.54rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }

    .stat-value.gold  { color: var(--gold); }
    .stat-value.blue  { color: var(--blue); }

    /* ── Play Button ─────────────────────────── */
    .play-btn {
      background: linear-gradient(135deg, var(--gold) 0%, #a8832a 100%);
      color: #08090F;
      border: none;
      border-radius: 100px;
      padding: 12px 36px;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.22s ease;
      box-shadow: 0 4px 20px var(--gold-glow);
      flex-shrink: 0;
    }

    .play-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--gold-glow);
    }

    .play-btn:active:not(:disabled) { transform: translateY(0); }

    .play-btn:disabled {
      background: rgba(255,255,255,0.08);
      color: var(--text-dim);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── End Modal ───────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,9,15,0.88);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 44px 40px;
      max-width: 420px;
      width: 92%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(24px);
      text-align: center;
    }

    .modal-icon { font-size: 2.8rem; }

    .modal h2 {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
    }

    .modal p {
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .modal-scores {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .modal-score {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .modal-score .val {
      font-family: var(--mono);
      font-size: 1.3rem;
      color: var(--gold);
    }

    .modal-score .lbl {
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .modal .play-btn { width: 100%; justify-content: center; display: flex; }

    /* ── Attempts pips ───────────────────────── */
    .attempts-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .pip {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold-glow);
      transition: all 0.3s;
    }

    .pip.gone {
      background: rgba(255,255,255,0.1);
      box-shadow: none;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .grid.shaking { animation: shake 0.38s ease; }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="page">

  <!-- Header -->
  <header class="header">
    <h1>Memory Constellation</h1>
    <div class="level-badge">LEVEL <span id="level-num">01</span></div>
  </header>

  <!-- Phase label -->
  <div class="phase-label" id="phase-label">Press Play to begin</div>

  <!-- Sequence progress dots -->
  <div class="seq-track" id="seq-track"></div>

  <!-- 3×3 Grid -->
  <div class="grid-wrap">
    <div class="grid" id="grid">
      <div class="tile disabled" data-idx="0"></div>
      <div class="tile disabled" data-idx="1"></div>
      <div class="tile disabled" data-idx="2"></div>
      <div class="tile disabled" data-idx="3"></div>
      <div class="tile disabled" data-idx="4"></div>
      <div class="tile disabled" data-idx="5"></div>
      <div class="tile disabled" data-idx="6"></div>
      <div class="tile disabled" data-idx="7"></div>
      <div class="tile disabled" data-idx="8"></div>
    </div>
  </div>

  <!-- Feedback banner -->
  <div class="feedback" id="feedback">Watch the sequence, then repeat it.</div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value gold" id="stat-score">000</span>
    </div>
    <div class="stat">
      <span class="stat-label">Accuracy</span>
      <span class="stat-value" id="stat-acc">0%</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best Level</span>
      <span class="stat-value blue" id="stat-best">01</span>
    </div>
    <div class="stat">
      <span class="stat-label">Streak</span>
      <span class="stat-value" id="stat-streak">0</span>
    </div>
  </div>

  <!-- Attempts + Play button row -->
  <div style="display:flex; align-items:center; gap:24px;">
    <div class="attempts-row" id="attempts-row">
      <div class="pip" id="pip-0"></div>
      <div class="pip" id="pip-1"></div>
      <div class="pip" id="pip-2"></div>
    </div>
    <button class="play-btn" id="play-btn">[ PLAY ]</button>
  </div>

</div>

<!-- Session End Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-icon" id="m-icon">🌟</div>
    <h2 id="m-title">Session Complete</h2>
    <p id="m-msg">Here's your cognitive performance summary.</p>

    <div class="modal-scores">
      <div class="modal-score">
        <span class="val" id="m-score">—</span>
        <span class="lbl">Cog Score</span>
      </div>
      <div class="modal-score">
        <span class="val" id="m-acc">—</span>
        <span class="lbl">Accuracy</span>
      </div>
      <div class="modal-score">
        <span class="val" id="m-level">—</span>
        <span class="lbl">Best Level</span>
      </div>
    </div>

    <button class="play-btn" id="restart-btn" style="width:100%">[ PLAY AGAIN ]</button>
  </div>
</div>

<script>
/* ─── Starfield ──────────────────────────────────────────── */
(function () {
  const c = document.getElementById('starfield');
  const x = c.getContext('2d');
  let s = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  function init() {
    s = Array.from({ length: 100 }, () => ({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: Math.random() * 0.9 + 0.2, a: Math.random(), sp: Math.random() * 0.004 + 0.001,
    }));
  }
  function draw() {
    x.clearRect(0, 0, c.width, c.height);
    s.forEach(p => {
      p.a += p.sp;
      const al = (Math.sin(p.a) + 1) / 2 * 0.45 + 0.05;
      x.beginPath(); x.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      x.fillStyle = `rgba(240,237,230,${al})`; x.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize', () => { resize(); init(); });
})();


/* ─── Voice ─────────────────────────────────────────────── */
const Voice = (() => {
  let last = 0;
  const sy = window.speechSynthesis;
  return {
    say(text, urgent = false) {
      const now = Date.now(), gap = urgent ? 1200 : 3500;
      if (now - last < gap) return;
      if (sy.speaking) sy.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.88; u.pitch = 1; u.volume = 1;
      sy.speak(u); last = now;
    }
  };
})();


/* ─── Game ───────────────────────────────────────────────── */
const Game = (() => {
  const MAX_LEVELS  = 100;
  const FLASH_ON    = 520;   // ms tile stays lit during playback
  const FLASH_GAP   = 260;   // ms between tiles during playback
  const TILE_DIM    = 9;     // number of tiles
  const START_ATTS  = 3;

  let level         = 1;
  let sequence      = [];    // full growing sequence (kept across levels)
  let playerInput   = [];
  let phase         = 'idle';
  let score         = 0;
  let totalTaps     = 0;
  let correctTaps   = 0;
  let streak        = 0;
  let bestLevel     = 1;
  let attemptsLeft  = START_ATTS;
  let responseTimes = [];
  let respStart     = 0;
  let locked        = false;  // prevent double-taps during animation

  /* DOM */
  const tiles      = () => [...document.querySelectorAll('.tile')];
  const $           = id => document.getElementById(id);
  const grid        = $('grid');
  const feedback    = $('feedback');
  const seqTrack    = $('seq-track');
  const playBtn     = $('play-btn');
  const overlay     = $('overlay');

  /* ── Helpers ─────────────────────────────────────── */
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function setPhase(p) {
    phase = p;
    const pl = $('phase-label');
    const map = {
      idle:     ['Press Play to begin',           ''],
      watching: ['Memorise the sequence…',         'watching'],
      respond:  ['Repeat the sequence',            'respond'],
      success:  ['Correct! Moving up…',            'success'],
      fail:     [`Wrong — ${attemptsLeft} left`,   'fail'],
      over:     ['Session ended',                  'fail'],
    };
    pl.textContent = map[p][0];
    pl.className   = `phase-label ${map[p][1]}`;
  }

  function setFeedback(text, type = '') {
    feedback.textContent = text;
    feedback.className   = `feedback ${type}`;
  }

  function updateStats() {
    const acc = totalTaps > 0 ? Math.round((correctTaps / totalTaps) * 100) : 0;
    $('stat-score').textContent  = String(score).padStart(3, '0');
    $('stat-acc').textContent    = `${acc}%`;
    $('stat-best').textContent   = String(bestLevel).padStart(2, '0');
    $('stat-streak').textContent = streak;
    $('level-num').textContent   = String(level).padStart(2, '0');
  }

  function renderDots() {
    seqTrack.innerHTML = '';
    // Show how many tiles have been confirmed so far
    sequence.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'seq-dot';
      d.id = `dot-${i}`;
      seqTrack.appendChild(d);
    });
  }

  function dotState(i, s) {
    const d = $(`dot-${i}`);
    if (d) d.className = `seq-dot ${s}`;
  }

  function renderPips() {
    for (let i = 0; i < START_ATTS; i++) {
      const p = $(`pip-${i}`);
      if (p) p.className = `pip${i < attemptsLeft ? '' : ' gone'}`;
    }
  }

  function enableTiles(on) {
    tiles().forEach(t => {
      if (on) { t.classList.remove('disabled'); }
      else    { t.classList.add('disabled'); }
    });
  }

  /* ── Flash a tile ────────────────────────────────── */
  async function flashTile(idx, cls, duration) {
    const t = tiles()[idx];
    t.classList.add(cls);
    await sleep(duration);
    t.classList.remove(cls);
  }

  /* ── Play the current sequence ───────────────────── */
  async function playSequence() {
    setPhase('watching');
    setFeedback(`Watch carefully — ${sequence.length} tile${sequence.length > 1 ? 's' : ''}`, 'watching');
    enableTiles(false);
    playBtn.disabled = true;
    locked = true;

    renderDots();

    Voice.say('Watch the sequence carefully');

    for (let i = 0; i < sequence.length; i++) {
      await sleep(FLASH_GAP);
      dotState(i, 'lit');
      await flashTile(sequence[i], 'flash-gold', FLASH_ON);
      dotState(i, 'done');
    }

    await sleep(350);
    startInput();
  }

  /* ── Allow player to respond ─────────────────────── */
  function startInput() {
    playerInput = [];
    respStart   = Date.now();
    setPhase('respond');
    setFeedback(`Tap ${sequence.length} tiles in the same order`, 'respond');
    enableTiles(true);
    locked = false;

    // Reset dots for player to fill
    renderDots();

    Voice.say(`Your turn — tap ${sequence.length} tiles`);
  }

  /* ── Handle tap ──────────────────────────────────── */
  async function handleTap(idx) {
    if (phase !== 'respond' || locked) return;
    locked = true;

    totalTaps++;
    const expected = sequence[playerInput.length];

    if (idx === expected) {
      // Correct
      correctTaps++;
      playerInput.push(idx);
      dotState(playerInput.length - 1, 'done');
      flashTile(idx, 'flash-correct', 300);

      if (playerInput.length === sequence.length) {
        // Full sequence matched!
        locked = true;
        enableTiles(false);
        await sleep(300);
        onLevelComplete();
      } else {
        Voice.say('Good, keep going');
        locked = false;
      }
    } else {
      // Wrong
      correctTaps;   // don't increment
      flashTile(idx, 'flash-wrong', 400);
      // shake grid
      grid.classList.add('shaking');
      setTimeout(() => grid.classList.remove('shaking'), 380);
      await sleep(450);

      attemptsLeft--;
      renderPips();
      updateStats();

      if (attemptsLeft <= 0) {
        onGameOver();
      } else {
        setPhase('fail');
        setFeedback(`✗ Wrong! ${attemptsLeft} attempt${attemptsLeft > 1 ? 's' : ''} remaining`, 'fail');
        Voice.say(`Wrong. ${attemptsLeft} attempts left. Replaying sequence.`);
        enableTiles(false);
        playBtn.disabled   = false;
        playBtn.textContent= '[ REPLAY ]';
        locked = false;
        streak = 0;
        updateStats();
      }
    }
  }

  /* ── Level complete ──────────────────────────────── */
  async function onLevelComplete() {
    const elapsed = Date.now() - respStart;
    responseTimes.push(elapsed);

    score += level * 100 + Math.max(0, 4000 - elapsed);
    streak++;
    bestLevel = Math.max(bestLevel, level);
    updateStats();

    setPhase('success');
    setFeedback(`✦ Perfect! +${level * 100} points`, 'success');
    Voice.say(`Level ${level} complete!`, true);

    if (level >= MAX_LEVELS) {
      await sleep(1000);
      showEndModal();
      return;
    }

    // Grow sequence by 1 for next level
    level++;
    $('level-num').textContent = String(level).padStart(2, '0');
    attemptsLeft = START_ATTS;
    renderPips();

    // Add next tile to master sequence
    let last = sequence[sequence.length - 1];
    let next;
    do { next = Math.floor(Math.random() * TILE_DIM); } while (next === last);
    sequence.push(next);

    playBtn.disabled   = false;
    playBtn.textContent= `[ LEVEL ${level} — PLAY ]`;

    await sleep(1200);
    // Auto-play next level
    playSequence();
  }

  /* ── Game over ───────────────────────────────────── */
  function onGameOver() {
    setPhase('over');
    setFeedback('No attempts left — session ended', 'fail');
    enableTiles(false);
    Voice.say('Session over. Check your results.', true);
    updateStats();
    setTimeout(showEndModal, 1200);
  }

  /* ── End modal ───────────────────────────────────── */
  function showEndModal() {
    const acc = totalTaps > 0 ? Math.round((correctTaps / totalTaps) * 100) : 0;
    const avgMs = responseTimes.length
      ? Math.round(responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length)
      : 9999;

    const accScore   = acc;
    const lvlScore   = Math.min((bestLevel / MAX_LEVELS) * 100, 100);
    const speedScore = Math.max(0, 100 - avgMs / 80);
    const cog        = Math.round(accScore * 0.5 + lvlScore * 0.3 + speedScore * 0.2);

    $('m-score').textContent = `${cog}%`;
    $('m-acc').textContent   = `${acc}%`;
    $('m-level').textContent = `L${bestLevel}`;

    const great = cog >= 70;
    $('m-icon').textContent  = great ? '🌟' : cog >= 50 ? '⭐' : '💙';
    $('m-title').textContent = great ? 'Excellent Session' : cog >= 50 ? 'Good Progress' : 'Keep Practising';
    $('m-msg').textContent   = `Level ${bestLevel} reached — ${acc}% accuracy. `
      + (great ? 'Outstanding memory performance!' : 'Every session builds stronger neural connections.');

    overlay.classList.add('show');
  }

  /* ── Init / Reset ────────────────────────────────── */
  function init() {
    level        = 1;
    score        = 0;
    totalTaps    = 0;
    correctTaps  = 0;
    streak       = 0;
    bestLevel    = 1;
    attemptsLeft = START_ATTS;
    responseTimes= [];
    phase        = 'idle';
    locked       = false;

    // Seed first sequence: 1 tile (Level 1 = 1 tile)
    sequence = [Math.floor(Math.random() * TILE_DIM)];

    seqTrack.innerHTML = '';
    enableTiles(false);
    renderPips();
    updateStats();
    setPhase('idle');
    setFeedback('Watch the sequence, then repeat it.');

    playBtn.disabled   = false;
    playBtn.textContent= '[ PLAY ]';
  }

  /* ── Wire play button ────────────────────────────── */
  playBtn.addEventListener('click', () => {
    if (phase === 'idle' || phase === 'fail') playSequence();
  });

  /* ── Wire tiles ──────────────────────────────────── */
  tiles().forEach(tile => {
    tile.addEventListener('click', () => {
      if (!tile.classList.contains('disabled')) {
        handleTap(Number(tile.dataset.idx));
      }
    });
  });

  /* ── Restart ─────────────────────────────────────── */
  $('restart-btn').addEventListener('click', () => {
    overlay.classList.remove('show');
    init();
  });

  return { init };
})();

Game.init();
</script>
