<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Flash — RehabAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── PRD Design Tokens ─────────────────────────── */
    :root {
      --void:         #08090F;
      --glass:        rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.07);
      --gold:         #C9A84C;
      --gold-dim:     rgba(201,168,76,0.15);
      --gold-glow:    rgba(201,168,76,0.45);
      --blue:         #4A6FA5;
      --blue-dim:     rgba(74,111,165,0.15);
      --blue-glow:    rgba(74,111,165,0.45);
      --red:          #C47474;
      --red-dim:      rgba(196,116,116,0.15);
      --red-glow:     rgba(196,116,116,0.45);
      --teal:         #4AA59A;
      --teal-dim:     rgba(74,165,154,0.15);
      --teal-glow:    rgba(74,165,154,0.45);
      --text:         #F0EDE6;
      --text-dim:     rgba(240,237,230,0.45);
      --mono:         'DM Mono', monospace;
      --sans:         'DM Sans', sans-serif;
      --serif:        'Cormorant Garamond', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--void);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 16px 12px;
    }

    /* ── Starfield ──────────────────────────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header h1 {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
    }

    .round-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 100px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-dim);
    }

    .round-badge span { color: var(--gold); }

    /* ── Phase label ─────────────────────────────────── */
    .phase-label {
      font-family: var(--mono);
      font-size: 0.64rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      height: 16px;
      flex-shrink: 0;
      transition: color 0.25s;
    }
    .phase-label.waiting { color: var(--text-dim); }
    .phase-label.ready   { color: var(--blue); }
    .phase-label.flash   { color: var(--gold); }
    .phase-label.success { color: var(--gold); }
    .phase-label.miss    { color: var(--red); }
    .phase-label.early   { color: var(--red); }

    /* ── Flash arena ─────────────────────────────────── */
    .arena {
      width: min(380px, 90vw);
      /* Grows to fill remaining vertical space */
      flex: 1;
      min-height: 0;
      max-height: min(380px, 50vh);
      border-radius: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Countdown ring */
    .countdown-ring {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg { transform: rotate(-90deg); }
    .ring-bg  { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 4; }
    .ring-arc {
      fill: none;
      stroke: rgba(74,111,165,0.4);
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
    }

    /* The flashing circle */
    .flash-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: transparent;
      border: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s ease;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }

    .flash-circle.show {
      animation: circleIn 0.18s ease;
    }

    @keyframes circleIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .flash-circle.hide {
      animation: circleOut 0.15s ease forwards;
    }

    @keyframes circleOut {
      to { transform: scale(0.8); opacity: 0; }
    }

    /* Color variants */
    .flash-circle.gold {
      background: radial-gradient(circle at 35% 35%, rgba(220,195,110,0.9), rgba(201,168,76,0.85));
      border-color: rgba(201,168,76,0.6);
      box-shadow: 0 0 60px var(--gold-glow), 0 0 120px rgba(201,168,76,0.2);
    }
    .flash-circle.blue {
      background: radial-gradient(circle at 35% 35%, rgba(100,140,190,0.9), rgba(74,111,165,0.85));
      border-color: rgba(74,111,165,0.6);
      box-shadow: 0 0 60px var(--blue-glow), 0 0 120px rgba(74,111,165,0.2);
    }
    .flash-circle.red {
      background: radial-gradient(circle at 35% 35%, rgba(220,140,140,0.9), rgba(196,116,116,0.85));
      border-color: rgba(196,116,116,0.6);
      box-shadow: 0 0 60px var(--red-glow), 0 0 120px rgba(196,116,116,0.2);
    }
    .flash-circle.teal {
      background: radial-gradient(circle at 35% 35%, rgba(100,190,180,0.9), rgba(74,165,154,0.85));
      border-color: rgba(74,165,154,0.6);
      box-shadow: 0 0 60px var(--teal-glow), 0 0 120px rgba(74,165,154,0.2);
    }

    /* Idle / waiting ripple */
    .idle-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.08);
      animation: idlePulse 2.4s ease-in-out infinite;
    }

    @keyframes idlePulse {
      0%,100% { transform: scale(1);    opacity: 0.4; }
      50%      { transform: scale(1.15); opacity: 0.15; }
    }

    /* Reaction time display inside circle */
    .reaction-display {
      position: absolute;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--text);
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .reaction-display.show { opacity: 1; }

    /* ── Color Buttons ───────────────────────────────── */
    .color-buttons {
      width: min(380px, 90vw);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      flex-shrink: 0;
    }

    .color-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 12px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .color-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 60%);
      pointer-events: none;
    }

    .color-btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); }
    .color-btn:active:not(:disabled) { transform: scale(0.96); }
    .color-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .color-btn.gold {
      background: rgba(201,168,76,0.2);
      border-color: rgba(201,168,76,0.4);
      color: var(--gold);
    }
    .color-btn.gold:hover:not(:disabled) {
      background: rgba(201,168,76,0.32);
      box-shadow: 0 6px 24px var(--gold-glow);
    }

    .color-btn.blue {
      background: rgba(74,111,165,0.2);
      border-color: rgba(74,111,165,0.4);
      color: #7ba7d4;
    }
    .color-btn.blue:hover:not(:disabled) {
      background: rgba(74,111,165,0.32);
      box-shadow: 0 6px 24px var(--blue-glow);
    }

    .color-btn.red {
      background: rgba(196,116,116,0.2);
      border-color: rgba(196,116,116,0.4);
      color: var(--red);
    }
    .color-btn.red:hover:not(:disabled) {
      background: rgba(196,116,116,0.32);
      box-shadow: 0 6px 24px var(--red-glow);
    }

    .color-btn.teal {
      background: rgba(74,165,154,0.2);
      border-color: rgba(74,165,154,0.4);
      color: var(--teal);
    }
    .color-btn.teal:hover:not(:disabled) {
      background: rgba(74,165,154,0.32);
      box-shadow: 0 6px 24px var(--teal-glow);
    }

    /* Hit flash  */
    .color-btn.hit-correct {
      background: rgba(201,168,76,0.5) !important;
      border-color: var(--gold) !important;
      box-shadow: 0 0 30px var(--gold-glow) !important;
      color: var(--void) !important;
    }
    .color-btn.hit-wrong {
      background: rgba(196,116,116,0.4) !important;
      border-color: var(--red) !important;
      box-shadow: 0 0 24px var(--red-glow) !important;
    }

    /* Dot swatch */
    .btn-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .gold  .btn-dot { background: var(--gold); }
    .blue  .btn-dot { background: var(--blue); }
    .red   .btn-dot { background: var(--red); }
    .teal  .btn-dot { background: var(--teal); }

    /* ── Feedback banner ─────────────────────────────── */
    .feedback {
      width: min(380px, 90vw);
      padding: 9px 16px;
      border-radius: 10px;
      font-family: var(--mono);
      font-size: 0.66rem;
      letter-spacing: 0.07em;
      text-align: center;
      min-height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-dim);
    }
    .feedback.success { background: var(--gold-dim);  border-color: rgba(201,168,76,0.35);  color: var(--gold); }
    .feedback.miss    { background: var(--red-dim);   border-color: rgba(196,116,116,0.35); color: var(--red); }
    .feedback.early   { background: var(--red-dim);   border-color: rgba(196,116,116,0.35); color: var(--red); }
    .feedback.ready   { background: var(--blue-dim);  border-color: rgba(74,111,165,0.35);  color: #7ba7d4; }

    /* ── Stats Bar ───────────────────────────────────── */
    .stats-bar {
      width: min(380px, 90vw);
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .stat {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 0.52rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }
    .stat-value.gold { color: var(--gold); }
    .stat-value.blue { color: #7ba7d4; }
    .stat-value.teal { color: var(--teal); }

    /* ── Play Button ─────────────────────────────────── */
    .play-btn {
      background: linear-gradient(135deg, var(--gold) 0%, #a8832a 100%);
      color: #08090F;
      border: none;
      border-radius: 100px;
      padding: 11px 32px;
      font-family: var(--mono);
      font-size: 0.73rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px var(--gold-glow);
      flex-shrink: 0;
    }
    .play-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px var(--gold-glow); }
    .play-btn:disabled {
      background: rgba(255,255,255,0.08);
      color: var(--text-dim);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Attempts Pips ───────────────────────────────── */
    .attempts-row {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-shrink: 0;
    }

    .pip {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 5px var(--gold-glow);
      transition: all 0.3s;
    }
    .pip.gone {
      background: rgba(255,255,255,0.1);
      box-shadow: none;
    }

    /* ── Round progress bar ──────────────────────────── */
    .round-progress-wrap {
      width: min(380px, 90vw);
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .round-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--gold));
      border-radius: 100px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* ── Session End Modal ───────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,9,15,0.88);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 44px 40px;
      max-width: 420px;
      width: 92%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(24px);
      text-align: center;
    }

    .modal-icon { font-size: 2.8rem; }

    .modal h2 {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
    }

    .modal p {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .modal-scores {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .modal-score {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .modal-score .val {
      font-family: var(--mono);
      font-size: 1.25rem;
      color: var(--gold);
    }
    .modal-score .lbl {
      font-family: var(--mono);
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Early click shake ───────────────────────────── */
    @keyframes arenaShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-10px); }
      40%     { transform: translateX(10px); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(6px); }
    }
    .arena.shake { animation: arenaShake 0.35s ease; }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="page">

  <!-- Header -->
  <header class="header">
    <h1>Reaction Flash</h1>
    <div class="round-badge">ROUND <span id="round-num">00</span> / 20</div>
  </header>

  <!-- Phase label -->
  <div class="phase-label waiting" id="phase-label">Press Play to begin</div>

  <!-- Round progress bar -->
  <div class="round-progress-wrap">
    <div class="round-progress-fill" id="round-bar"></div>
  </div>

  <!-- Flash arena -->
  <div class="arena" id="arena">
    <!-- Countdown ring -->
    <div class="countdown-ring">
      <svg class="ring-svg" width="320" height="320" viewBox="0 0 320 320">
        <circle class="ring-bg"  cx="160" cy="160" r="152"/>
        <circle class="ring-arc" cx="160" cy="160" r="152" id="ring-arc"
          stroke-dasharray="955" stroke-dashoffset="955"/>
      </svg>
    </div>
    <!-- The flashing circle -->
    <div class="flash-circle" id="flash-circle">
      <div class="idle-ring" id="idle-ring"></div>
    </div>
    <!-- Reaction time result -->
    <div class="reaction-display" id="reaction-display"></div>
  </div>

  <!-- Color Buttons -->
  <div class="color-buttons" id="color-buttons">
    <button class="color-btn gold" id="btn-gold" disabled>
      <div class="btn-dot"></div> Gold
    </button>
    <button class="color-btn blue" id="btn-blue" disabled>
      <div class="btn-dot"></div> Blue
    </button>
    <button class="color-btn red" id="btn-red" disabled>
      <div class="btn-dot"></div> Red
    </button>
    <button class="color-btn teal" id="btn-teal" disabled>
      <div class="btn-dot"></div> Teal
    </button>
  </div>

  <!-- Feedback -->
  <div class="feedback" id="feedback">Watch the circle — tap the matching color button fast!</div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value gold" id="stat-score">000</span>
    </div>
    <div class="stat">
      <span class="stat-label">Avg Time</span>
      <span class="stat-value blue" id="stat-avg">—ms</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best Time</span>
      <span class="stat-value teal" id="stat-best">—ms</span>
    </div>
    <div class="stat">
      <span class="stat-label">Streak</span>
      <span class="stat-value" id="stat-streak">0</span>
    </div>
  </div>

  <!-- Attempts + Play -->
  <div style="display:flex; align-items:center; gap:24px;">
    <div class="attempts-row" id="attempts-row">
      <div class="pip" id="pip-0"></div>
      <div class="pip" id="pip-1"></div>
      <div class="pip" id="pip-2"></div>
    </div>
    <button class="play-btn" id="play-btn">[ PLAY ]</button>
  </div>

</div>

<!-- End Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-icon" id="m-icon">⚡</div>
    <h2 id="m-title">Session Complete</h2>
    <p id="m-msg">Your reaction speed summary.</p>
    <div class="modal-scores">
      <div class="modal-score">
        <span class="val" id="m-score">—</span>
        <span class="lbl">Cog Score</span>
      </div>
      <div class="modal-score">
        <span class="val" id="m-avg">—</span>
        <span class="lbl">Avg Time</span>
      </div>
      <div class="modal-score">
        <span class="val" id="m-best">—</span>
        <span class="lbl">Best Time</span>
      </div>
    </div>
    <button class="play-btn" id="restart-btn" style="width:100%">[ PLAY AGAIN ]</button>
  </div>
</div>

<script>
/* ─── Starfield ──────────────────────────────────── */
(function () {
  const c = document.getElementById('starfield');
  const x = c.getContext('2d');
  let s = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  function init() {
    s = Array.from({ length: 100 }, () => ({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: Math.random() * 0.9 + 0.2, a: Math.random(), sp: Math.random() * 0.004 + 0.001
    }));
  }
  function draw() {
    x.clearRect(0, 0, c.width, c.height);
    s.forEach(p => {
      p.a += p.sp;
      const al = (Math.sin(p.a) + 1) / 2 * 0.4 + 0.05;
      x.beginPath(); x.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      x.fillStyle = `rgba(240,237,230,${al})`; x.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize', () => { resize(); init(); });
})();


/* ─── Voice ──────────────────────────────────────── */
const Voice = (() => {
  let last = 0;
  const sy = window.speechSynthesis;
  return {
    say(text, urgent = false) {
      const now = Date.now(), gap = urgent ? 1200 : 3000;
      if (now - last < gap) return;
      if (sy.speaking) sy.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.88; u.pitch = 1; u.volume = 1;
      sy.speak(u); last = now;
    }
  };
})();


/* ─── Game ───────────────────────────────────────── */
const Game = (() => {
  const COLORS      = ['gold', 'blue', 'red', 'teal'];
  const COLOR_NAMES = { gold: 'Gold', blue: 'Blue', red: 'Red', teal: 'Teal' };
  const TOTAL_ROUNDS= 20;
  const ATTS        = 3;

  /* Difficulty tiers — milliseconds the circle stays visible */
  // Level 1-5: 2200ms  |  6-10: 1700ms  |  11-15: 1300ms  |  16-20: 1000ms
  function flashDuration(round) {
    if (round <= 5)  return 2200;
    if (round <= 10) return 1700;
    if (round <= 15) return 1300;
    return 1000;
  }

  /* min/max delay before circle appears (ms) */
  const MIN_DELAY = 800, MAX_DELAY = 2800;

  let round         = 0;
  let attemptsLeft  = ATTS;
  let score         = 0;
  let streak        = 0;
  let reactionTimes = [];
  let bestTime      = Infinity;
  let phase         = 'idle'; // idle | waiting | flash | result
  let currentColor  = null;
  let flashStart    = 0;
  let flashTimer    = null;
  let waitTimer     = null;
  let ringTimer     = null;
  let canClick      = false;

  /* DOM */
  const $ = id => document.getElementById(id);
  const circle     = $('flash-circle');
  const idleRing   = $('idle-ring');
  const arena      = $('arena');
  const feedback   = $('feedback');
  const playBtn    = $('play-btn');
  const overlay    = $('overlay');
  const reactionDisp = $('reaction-display');
  const ringArc    = $('ring-arc');
  const roundBar   = $('round-bar');
  const CIRCUMFERENCE = 955;

  /* ── Helpers ─────────────────────────────────── */
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function setPhase(p, extra = '') {
    phase = p;
    const pl = $('phase-label');
    const map = {
      idle:    ['Press Play to begin',                 'waiting'],
      waiting: ['Get ready…',                          'ready'],
      flash:   ['Tap the matching color — NOW!',       'flash'],
      success: [`✦ ${extra}ms — Great reaction!`,      'success'],
      miss:    ['Too slow — circle disappeared',        'miss'],
      early:   ['Too early! Wait for the circle',      'early'],
      over:    ['Session ended',                        'miss'],
    };
    pl.textContent = map[p][0];
    pl.className   = `phase-label ${map[p][1]}`;
  }

  function setFeedback(text, type = '') {
    feedback.textContent = text;
    feedback.className   = `feedback ${type}`;
  }

  function updateStats() {
    const avg = reactionTimes.length
      ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length)
      : null;
    $('stat-score').textContent  = String(score).padStart(3, '0');
    $('stat-avg').textContent    = avg !== null ? `${avg}ms` : '—ms';
    $('stat-best').textContent   = bestTime < Infinity ? `${bestTime}ms` : '—ms';
    $('stat-streak').textContent = streak;
    $('round-num').textContent   = String(round).padStart(2, '0');
    $('round-bar').style.width   = `${(round / TOTAL_ROUNDS) * 100}%`;
  }

  function renderPips() {
    for (let i = 0; i < ATTS; i++) {
      const p = $(`pip-${i}`);
      if (p) p.className = `pip${i < attemptsLeft ? '' : ' gone'}`;
    }
  }

  function disableButtons() {
    COLORS.forEach(c => $(`btn-${c}`).disabled = true);
    canClick = false;
  }

  function enableButtons() {
    COLORS.forEach(c => $(`btn-${c}`).disabled = false);
    canClick = true;
  }

  function clearTimers() {
    clearTimeout(flashTimer);
    clearTimeout(waitTimer);
    clearInterval(ringTimer);
  }

  /* ── Ring countdown ──────────────────────────── */
  function startRingCountdown(durationMs) {
    clearInterval(ringTimer);
    let elapsed = 0;
    const tick  = 60;
    ringArc.style.stroke = 'rgba(74,111,165,0.4)';
    ringArc.style.strokeDashoffset = '0';

    ringTimer = setInterval(() => {
      elapsed += tick;
      const pct    = Math.min(elapsed / durationMs, 1);
      const offset = CIRCUMFERENCE * pct;
      ringArc.style.strokeDashoffset = offset;

      // Color shifts from blue → gold → red as time runs out
      if (pct < 0.5) {
        ringArc.style.stroke = `rgba(74,111,165,${0.4 + pct * 0.4})`;
      } else if (pct < 0.8) {
        ringArc.style.stroke = `rgba(201,168,76,${0.5 + pct * 0.3})`;
      } else {
        ringArc.style.stroke = `rgba(196,116,116,${0.6 + pct * 0.4})`;
      }

      if (pct >= 1) clearInterval(ringTimer);
    }, tick);
  }

  /* ── Show flash circle ───────────────────────── */
  function showFlash() {
    // Pick random color, try not to repeat
    let color;
    do { color = COLORS[Math.floor(Math.random() * COLORS.length)]; }
    while (color === currentColor && COLORS.length > 1);
    currentColor = color;

    /* Clear idle ring */
    idleRing.style.display = 'none';

    /* Apply color */
    circle.className = `flash-circle ${color} show`;
    flashStart = Date.now();
    setPhase('flash');

    const dur = flashDuration(round);
    startRingCountdown(dur);
    enableButtons();

    /* Auto-hide if not tapped */
    flashTimer = setTimeout(() => {
      onMiss();
    }, dur);
  }

  /* ── Wait then flash ─────────────────────────── */
  function scheduleFlash() {
    setPhase('waiting');
    setFeedback('Get ready… the circle will appear soon', 'ready');
    disableButtons();
    idleRing.style.display = '';
    circle.className = 'flash-circle';
    reactionDisp.classList.remove('show');
    ringArc.style.strokeDashoffset = CIRCUMFERENCE;
    Voice.say('Get ready');

    const delay = MIN_DELAY + Math.random() * (MAX_DELAY - MIN_DELAY);
    waitTimer = setTimeout(showFlash, delay);
  }

  /* ── Handle button tap ───────────────────────── */
  function handleTap(color) {
    if (!canClick) return;

    // ── Early click (buttons enabled before flash) ─ guard
    if (phase !== 'flash') {
      earlyClick();
      return;
    }

    clearTimers();
    disableButtons();
    idleRing.style.display = '';

    const elapsed = Date.now() - flashStart;

    if (color === currentColor) {
      // ✅ Correct
      onCorrect(elapsed, color);
    } else {
      // ❌ Wrong color
      onWrongColor(color, elapsed);
    }
  }

  function onCorrect(ms, color) {
    reactionTimes.push(ms);
    if (ms < bestTime) bestTime = ms;

    const points = Math.max(10, Math.round(3000 / ms * 100));
    score  += points;
    streak++;
    round++;
    updateStats();

    /* Flash the correct button gold */
    flashBtn($(`btn-${color}`), 'hit-correct');
    circle.className = `flash-circle ${color}`;
    circle.style.boxShadow = '0 0 80px rgba(201,168,76,0.8)';
    setTimeout(() => { circle.style.boxShadow = ''; }, 300);

    /* Show reaction time inside arena */
    reactionDisp.textContent = `${ms} ms`;
    reactionDisp.classList.add('show');

    setPhase('success', ms);
    setFeedback(
      ms < 300 ? `⚡ ${ms}ms — Exceptional!` :
      ms < 500 ? `✦ ${ms}ms — Fast!` :
      ms < 800 ? `✦ ${ms}ms — Good` :
                 `${ms}ms — Try to react faster`,
      'success'
    );
    Voice.say(ms < 400 ? 'Excellent reaction!' : 'Good job!', true);

    if (round >= TOTAL_ROUNDS) {
      setTimeout(showEndModal, 1200);
    } else {
      playBtn.disabled = false;
      playBtn.textContent = '[ NEXT ]';
      setTimeout(() => {
        playBtn.disabled = true;
        scheduleFlash();
      }, 1600);
    }
  }

  function onWrongColor(tapped, ms) {
    attemptsLeft--;
    renderPips();
    streak = 0;

    flashBtn($(`btn-${tapped}`), 'hit-wrong');
    arena.classList.add('shake');
    setTimeout(() => arena.classList.remove('shake'), 380);

    circle.className = 'flash-circle';
    idleRing.style.display = '';
    reactionDisp.classList.remove('show');
    setFeedback(`✗ Wrong color! The circle was ${COLOR_NAMES[currentColor]}. ${attemptsLeft} left`, 'miss');
    Voice.say(`Wrong color. That was ${COLOR_NAMES[currentColor]}.`);

    updateStats();

    if (attemptsLeft <= 0) { setTimeout(showEndModal, 1000); return; }

    setTimeout(scheduleFlash, 1600);
  }

  function onMiss() {
    clearTimers();
    disableButtons();
    attemptsLeft--;
    renderPips();
    streak = 0;
    updateStats();

    circle.className = 'flash-circle';
    idleRing.style.display = '';
    reactionDisp.classList.remove('show');
    setPhase('miss');
    setFeedback(`Too slow — ${attemptsLeft} attempt${attemptsLeft !== 1 ? 's' : ''} left`, 'miss');
    Voice.say('Too slow! Try to react faster.');

    if (attemptsLeft <= 0) { setTimeout(showEndModal, 1000); return; }
    setTimeout(scheduleFlash, 1600);
  }

  function earlyClick() {
    clearTimers();
    disableButtons();
    attemptsLeft--;
    renderPips();
    streak = 0;
    updateStats();

    arena.classList.add('shake');
    setTimeout(() => arena.classList.remove('shake'), 380);

    setPhase('early');
    setFeedback(`Too early! Wait for the circle to appear. ${attemptsLeft} left`, 'early');
    Voice.say('Too early! Wait for the circle.');

    if (attemptsLeft <= 0) { setTimeout(showEndModal, 1000); return; }
    setTimeout(scheduleFlash, 1600);
  }

  function flashBtn(btn, cls) {
    btn.classList.add(cls);
    setTimeout(() => btn.classList.remove(cls), 400);
  }

  /* ── End Modal ───────────────────────────────── */
  function showEndModal() {
    clearTimers();
    disableButtons();

    const acc    = round > 0 ? Math.round((round / (round + (ATTS - attemptsLeft))) * 100) : 0;
    const avg    = reactionTimes.length
      ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length)
      : 999;
    const best   = bestTime < Infinity ? bestTime : 999;

    /* Cognitive score: accuracy 40% + speed 40% + rounds 20% */
    const accScore   = acc;
    const speedScore = Math.max(0, 100 - avg / 12);
    const roundScore = Math.round((round / TOTAL_ROUNDS) * 100);
    const cog        = Math.round(accScore * 0.4 + speedScore * 0.4 + roundScore * 0.2);

    $('m-score').textContent = `${cog}%`;
    $('m-avg').textContent   = avg < 999 ? `${avg}ms` : '—';
    $('m-best').textContent  = best < 999 ? `${best}ms` : '—';

    const great = cog >= 70;
    $('m-icon').textContent  = great ? '⚡' : cog >= 50 ? '🌟' : '💙';
    $('m-title').textContent = great ? 'Lightning Fast' : cog >= 50 ? 'Good Speed' : 'Keep Training';
    $('m-msg').textContent   = `${round} rounds completed. Average reaction: ${avg < 999 ? avg + 'ms' : '—'}. `
      + (great ? 'Your processing speed is excellent!' : 'Consistent training improves reaction speed.');

    Voice.say(`Session complete. Score: ${cog} percent.`, true);
    overlay.classList.add('show');
  }

  /* ── Init ────────────────────────────────────── */
  function init() {
    clearTimers();
    round         = 0;
    attemptsLeft  = ATTS;
    score         = 0;
    streak        = 0;
    reactionTimes = [];
    bestTime      = Infinity;
    currentColor  = null;
    phase         = 'idle';
    canClick      = false;

    circle.className     = 'flash-circle';
    idleRing.style.display = '';
    reactionDisp.classList.remove('show');
    ringArc.style.strokeDashoffset = CIRCUMFERENCE;

    renderPips();
    updateStats();
    disableButtons();
    setPhase('idle');
    setFeedback('Watch the circle — tap the matching color button fast!');

    playBtn.disabled   = false;
    playBtn.textContent= '[ PLAY ]';
    playBtn.onclick    = () => {
      playBtn.disabled = true;
      scheduleFlash();
    };
  }

  /* ── Wire color buttons ──────────────────────── */
  COLORS.forEach(c => {
    $(`btn-${c}`).addEventListener('click', () => handleTap(c));
  });

  $('restart-btn').addEventListener('click', () => {
    overlay.classList.remove('show');
    init();
  });

  return { init };
})();

Game.init();
</script>
